<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Communities Prototypes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .brand {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: #9aa5b4;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #1a1d2e;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 16px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 52px;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card:hover {
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      transform: translateY(-3px);
    }

    .card-icon {
      font-size: 44px;
      margin-bottom: 20px;
      line-height: 1;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a1d2e;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: #9aa5b4;
    }

    .footer {
      margin-top: 60px;
      font-size: 13px;
      color: #9aa5b4;
    }

    .footer strong {
      color: #6b7280;
    }
  </style>
</head>
<body>

  <p class="brand">Clarity AI</p>

  <h1>Communities Prototypes</h1>
  <p class="subtitle">Internal use only &middot; Select a prototype to explore</p>

  <div class="cards">
    <a class="card" href="values.html">
      <div class="card-icon">🤍</div>
      <div class="card-title">Values-based prototype</div>
      <div class="card-subtitle">Human Rights</div>
    </a>

    <a class="card" href="finedining.html">
      <div class="card-icon">🍴</div>
      <div class="card-title">Lifestyle Communities prototype</div>
      <div class="card-subtitle">Fine Dining Club</div>
    </a>
  </div>

  <p class="footer">Powered by <strong>Clarity AI</strong></p>

</body>
</html>
